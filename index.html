<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <title>Notulen Engine</title>

  <meta name="description" content="Notulen Engine recorder and meeting processing interface.">
  <meta property="og:title" content="Notulen Engine">
  <meta property="og:description" content="Open the Notulen Engine interface.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/favicon.svg">

  <style>
    :root {
      --bg: #050505;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-right: var(--safe-right);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      background: var(--bg);
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      background: var(--bg);
    }

    @supports not (height: 100dvh) {
      .app-shell {
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <iframe
  src="/app"
  title="Notulen Engine"
  allow="camera; microphone; clipboard-read; clipboard-write; fullscreen"
  referrerpolicy="no-referrer"
></iframe>
  </main>
</body>
</html>
